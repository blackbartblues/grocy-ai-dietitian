<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Tło zaokrąglone -->
  <rect width="512" height="512" rx="110" fill="#1a1a1a"/>

  <!-- Jabłko (lewy górny) -->
