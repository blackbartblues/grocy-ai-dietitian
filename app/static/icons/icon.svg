  <path d="M122 175 Q100 175 88 210 Q72 255 84 305 Q96 350 120 372 Q138 388 158 383 Q175 378 192 378 Q209 378 226 383 Q246 388 264 372 Q288 350 300 305 Q312 255 296 210 Q284 175 262 175 Q242 175 222 188 Q212 194 202 194 Q192 194 182 188 Q162 175 122 175Z"
